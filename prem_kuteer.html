<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Go - প্রেম কুটির পোর্টাল</title>
    
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Custom Font: Le Cristal de Lune */
        @font-face {
            font-family: 'LeCristalDeLune';
            src: url('Le%20Cristal%20de%20Lune.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --primary-pink: #e91e63;
            --secondary-pink: #f06292;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            font-family: 'Kalpurush', Arial, sans-serif; 
            background: linear-gradient(135deg, #121212 0%, #000000 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        /* Ambient Glows like Index */
        .glow { position: fixed; width: 400px; height: 400px; border-radius: 50%; z-index: -1; filter: blur(100px); opacity: 0.2; animation: pulse 10s infinite alternate; }
        .glow-1 { background: var(--primary-pink); top: -100px; left: -100px; }
        .glow-2 { background: #00d2ff; bottom: -100px; right: -100px; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        .container { 
            width: 100%;
            max-width: 700px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(25px);
            padding: 40px 30px; 
            border-radius: 35px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            border: 1px solid var(--glass-border);
            position: relative;
            align-self: flex-start;
        }

        /* Header Area */
        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; text-align: center; }
        .ch-logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary-pink); box-shadow: 0 10px 20px rgba(233, 30, 99, 0.3); background: white; }
        .ch-title { font-size: 38px; color: var(--primary-pink); font-family: 'LeCristalDeLune', serif; letter-spacing: 2px; }
        .btn-home { position: absolute; top: 25px; left: 25px; text-decoration: none; color: #aaa; font-size: 14px; font-weight: bold; }
        .btn-home:hover { color: var(--primary-pink); }

        /* Login Screen */
        #loginScreen { text-align: center; padding: 40px 0; }
        .pass-input { width: 100%; max-width: 320px; padding: 15px; border: 1px solid var(--glass-border); border-radius: 18px; font-size: 18px; text-align: center; margin-bottom: 20px; outline: none; background: rgba(255,255,255,0.05); color: white; }
        .pass-input:focus { border-color: var(--primary-pink); background: rgba(255,255,255,0.08); }
        .btn-main { background: linear-gradient(45deg, var(--primary-pink), var(--secondary-pink)); color: white; border: none; padding: 15px 35px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(233, 30, 99, 0.2); }

        /* Tabs */
        .tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 20px; margin-bottom: 30px; overflow: hidden; padding: 5px; border: 1px solid var(--glass-border); }
        .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: bold; color: #888; border-radius: 15px; }
        .tab.active { background: var(--primary-pink); color: white; box-shadow: 0 5px 15px rgba(233, 30, 99, 0.2); }

        /* Forms */
        label { font-weight: bold; color: var(--primary-pink); display: block; margin: 20px 0 8px; font-size: 15px; opacity: 0.9; }
        input, select, textarea { width: 100%; padding: 15px; border: 1px solid var(--glass-border); border-radius: 15px; font-size: 16px; outline: none; background: rgba(255,255,255,0.03); color: white; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-pink); background: rgba(255,255,255,0.06); }
        select option { background: #1a1a1a; color: white; }

        /* Inbox Cards */
        .list-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .list-card b { color: var(--primary-pink); font-size: 18px; display: block; margin-bottom: 5px; }
        .list-card p { color: #aaa; font-size: 13px; line-height: 1.6; }
        
        audio { width: 100%; margin-top: 15px; height: 35px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        .badge-admin { background: var(--primary-pink); color: white; padding: 10px 20px; border-radius: 12px; font-weight: bold; display: inline-block; margin-bottom: 25px; font-size: 14px; }
        #statusMsg, #storyMsg { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="container">
    <a href="index.html" class="btn-home"><i class="fas fa-chevron-left"></i> ফিরে যান</a>
    
    <div class="header">
        <img src="https://i.ibb.co/hJdb514B/Logo.png" class="ch-logo">
        <h1 class="ch-title">প্রেম কুটির</h1>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <p style="margin-bottom: 25px; color:#888; letter-spacing: 1px;">সিকিউর পোর্টাল এক্সেস কোড দিন</p>
        <input type="password" id="passInput" class="pass-input" placeholder="পাসওয়ার্ড লিখুন">
        <br>
        <button class="btn-main" onclick="checkAccess()">প্রবেশ করুন <i class="fas fa-sign-in-alt"></i></button>
        <p id="loginError" style="color:var(--primary-pink); margin-top:15px; display:none; font-weight:bold;">ভুল কোড!</p>
    </div>

    <!-- MAIN PORTAL -->
    <div id="mainPortal" style="display:none;">
        <div id="adminControls" style="display:none; text-align:center;">
            <div class="badge-admin">
                <i class="fas fa-shield-alt"></i> স্বাগতম, <span id="currentUserName"></span>
            </div>
            <br>
            <button onclick="location.reload()" style="background:none; border:none; color:#666; font-size:12px; margin-bottom:20px; cursor:pointer;">লগ আউট</button>
        </div>

        <div class="tabs" id="userTabs">
            <div class="tab active" onclick="switchTab('upload')">কাজ জমা দিন</div>
            <div class="tab" onclick="switchTab('stories')">রাইটার্স জোন</div>
        </div>

        <!-- UPLOAD SECTION -->
        <div id="uploadSection">
            <label>চলমান প্রজেক্ট:</label>
            <select id="uProject"><option value="">প্রজেক্ট লোড হচ্ছে...</option></select>
            
            <label>কাজের ধরন:</label>
            <select id="uCategory">
                <option value="Voice">🎙️ ভয়েস অডিও</option>
                <option value="Script">✍️ স্ক্রিপ্ট / গল্প</option>
                <option value="Other">📁 অন্যান্য</option>
            </select>
            
            <label>আপনার নাম:</label>
            <input type="text" id="uName" placeholder="আপনার নাম লিখুন">
            
            <label>ফাইল সিলেক্ট করুন:</label>
            <input type="file" id="uFile" style="padding: 10px;">
            
            <button class="btn-main" style="margin-top:25px; width:100%;" onclick="submitWork()">জমা দিন <i class="fas fa-cloud-upload-alt"></i></button>
            <div id="uploadMsg"></div>
        </div>

        <!-- STORIES SECTION -->
        <div id="storiesSection" style="display:none;">
            <label>লেখকের নাম:</label>
            <input type="text" id="sAuthor" placeholder="নাম">
            <label>গল্পের শিরোনাম:</label>
            <input type="text" id="sTitle" placeholder="শিরোনাম">
            <label>গল্পটি লিখুন:</label>
            <textarea id="sText" placeholder="আপনার চমৎকার গল্পটি এখানে লিখুন..."></textarea>
            <button class="btn-main" style="margin-top:25px; width:100%;" onclick="submitStory()">গল্প পাঠান <i class="fas fa-paper-plane"></i></button>
            <div id="storyMsg"></div>
        </div>

        <!-- ADMIN DASHBOARD -->
        <div id="adminDashboard" style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 30px;">
            <h3 style="color:var(--primary-pink); margin-bottom:20px; font-family: 'LeCristalDeLune', serif; font-size: 28px;"><i class="fas fa-inbox"></i> ইনবক্স</h3>
            <div id="inboxList">লোড হচ্ছে...</div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCjrGdZMocegvJBIXKI5UKAfzFK7k3-iKI", projectId: "prothomkotha-2002" };
    const appId = "golposolpo-premium";
    const CLOUD_NAME = 'dy9bujsit'; 
    const UPLOAD_PRESET = 'Prothom Kotha Voice';
    const channelName = "প্রেম কুটির";

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const dbRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

    const ROLES = {
        "Master2002": "Master Admin",
        "Neha123": "বিদিশা মুখার্জি (মেন্টর)"
    };

    let userRole = ""; 
    let roleName = "";

    window.onload = () => auth.signInAnonymously();

    function checkAccess() {
        const pass = document.getElementById('passInput').value;
        if(pass === "PKUSER") { 
            userRole = "MEMBER";
            startPortal();
        } else if(ROLES[pass]) {
            userRole = "ADMIN";
            roleName = ROLES[pass];
            startPortal();
        } else {
            document.getElementById('loginError').style.display = "block";
        }
    }

    function startPortal() {
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('mainPortal').style.display = "block";
        loadProjects();
        if(userRole === "ADMIN") {
            document.getElementById('adminControls').style.display = "block";
            document.getElementById('currentUserName').innerText = roleName;
            document.getElementById('adminDashboard').style.display = "block";
            loadInbox();
        } else {
            document.getElementById('adminDashboard').style.display = "none";
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('uploadSection').style.display = tab === 'upload' ? 'block' : 'none';
        document.getElementById('storiesSection').style.display = tab === 'stories' ? 'block' : 'none';
        event.target.classList.add('active');
    }

    function loadProjects() {
        dbRef.collection('projects').onSnapshot(snap => {
            let html = '<option value="" disabled selected>প্রজেক্ট সিলেক্ট করুন</option>';
            snap.forEach(doc => {
                if(doc.data().channel === channelName) {
                    html += `<option value="${doc.id}">${doc.data().name}</option>`;
                }
            });
            document.getElementById('uProject').innerHTML = html;
        });
    }

    async function submitWork() {
        const pId = document.getElementById('uProject').value;
        const cat = document.getElementById('uCategory').value;
        const name = document.getElementById('uName').value.trim();
        const file = document.getElementById('uFile').files[0];
        const msg = document.getElementById('uploadMsg');

        if(!pId || !name || !file) return alert("সব তথ্য দিন!");
        
        msg.style.color = "var(--primary-pink)";
        msg.innerText = "⏳ আপলোড হচ্ছে...";
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(data.secure_url) {
                await dbRef.collection('tasks').add({
                    channel: channelName,
                    projectName: document.getElementById('uProject').options[document.getElementById('uProject').selectedIndex].text,
                    category: cat,
                    sender: name,
                    fileUrl: data.secure_url,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                msg.style.color = "#4caf50";
                msg.innerText = "✅ সফলভাবে জমা হয়েছে!";
                document.getElementById('uFile').value = "";
            }
        } catch(e) { msg.style.color = "red"; msg.innerText = "❌ ব্যর্থ হয়েছে!"; }
    }

    async function submitStory() {
        const author = document.getElementById('sAuthor').value.trim();
        const title = document.getElementById('sTitle').value.trim();
        const text = document.getElementById('sText').value.trim();
        const msg = document.getElementById('storyMsg');

        if(!author || !title || !text) return alert("সব ঘর পূরণ করুন!");
        
        msg.innerText = "⏳ পাঠানো হচ্ছে...";
        try {
            await dbRef.collection('channel_stories').add({
                channel: channelName,
                author, title, text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            msg.style.color = "#4caf50";
            msg.innerText = "✅ গল্প জমা হয়েছে!";
            document.getElementById('sAuthor').value = "";
            document.getElementById('sTitle').value = "";
            document.getElementById('sText').value = "";
        } catch(e) { msg.style.color = "red"; msg.innerText = "❌ ব্যর্থ!"; }
    }

    function loadInbox() {
        dbRef.collection('tasks').where('channel', '==', channelName).orderBy('timestamp', 'desc').onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isAudio = d.fileUrl.match(/\.(mp3|wav|ogg)$/i);
                html += `
                    <div class="list-card">
                        <b>👤 ${d.sender}</b>
                        <p>📦 প্রজেক্ট: ${d.projectName} | 📂 ক্যাটাগরি: ${d.category}</p>
                        ${isAudio ? `<audio controls src="${d.fileUrl}"></audio>` : ''}
                        <div style="margin-top:10px; display:flex; gap:15px;">
                            <a href="${d.fileUrl}" target="_blank" style="font-size:12px; color:var(--primary-pink); text-decoration:none; font-weight:bold;"><i class="fas fa-external-link-alt"></i> ফাইল দেখুন</a>
                            ${roleName === 'Master Admin' ? `<button onclick="deleteDoc('tasks', '${doc.id}')" style="color:red; background:none; border:none; cursor:pointer; font-size:12px;">ডিলিট</button>` : ''}
                        </div>
                    </div>
                `;
            });
            document.getElementById('inboxList').innerHTML = html || "<p style='text-align:center; color:#888;'>কোনো ফাইল জমা নেই।</p>";
        });
    }

    async function deleteDoc(col, id) {
        if(confirm("আপনি কি নিশ্চিত এটি ডিলিট করতে চান?")) await dbRef.collection(col).doc(id).delete();
    }
</script>
</body>
</html>
