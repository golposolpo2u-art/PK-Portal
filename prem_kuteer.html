<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Go - প্রেম কুটির পোর্টাল</title>
    
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Custom Font: Le Cristal de Lune */
        @font-face {
            font-family: 'LeCristalDeLune';
            src: url('Le%20Cristal%20de%20Lune.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --primary-pink: #e91e63;
            --secondary-pink: #f06292;
            --baby-pink: #fff0f5;
            --pure-white: #ffffff;
            --border-pink: #f8bbd0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s ease; }

        body { 
            font-family: 'Kalpurush', Arial, sans-serif; 
            background: linear-gradient(135deg, var(--baby-pink) 0%, #ffffff 100%);
            color: #333;
            min-height: 100vh;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%; max-width: 800px; 
            background: var(--pure-white);
            padding: 40px 30px; border-radius: 40px; 
            box-shadow: 0 25px 70px rgba(233, 30, 99, 0.12); 
            border: 3px solid var(--border-pink);
            position: relative; align-self: flex-start;
        }

        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; text-align: center; }
        .ch-logo { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 5px solid var(--primary-pink); box-shadow: 0 10px 25px rgba(233, 30, 99, 0.2); }
        .ch-title { font-size: 45px; color: var(--primary-pink); font-family: 'LeCristalDeLune', serif; letter-spacing: 2px; }
        .btn-home { position: absolute; top: 25px; left: 25px; text-decoration: none; color: var(--primary-pink); font-size: 14px; font-weight: bold; }

        /* Login Screen */
        #loginScreen { text-align: center; padding: 60px 0; }
        .pass-input { width: 100%; max-width: 380px; padding: 20px; border: 3px solid var(--baby-pink); border-radius: 20px; font-size: 22px; text-align: center; margin-bottom: 30px; outline: none; background: var(--baby-pink); color: #333; font-weight: bold; }
        .btn-main { background: linear-gradient(45deg, var(--primary-pink), var(--secondary-pink)); color: white; border: none; padding: 20px 50px; border-radius: 20px; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 12px 30px rgba(233, 30, 99, 0.3); width: 100%; max-width: 380px; }

        /* User Interface */
        #userPortal { display: none; }
        h2.section-title { color: var(--primary-pink); text-align: center; margin-bottom: 35px; font-size: 32px; border-bottom: 2px solid var(--baby-pink); padding-bottom: 15px; }
        label { font-weight: bold; color: var(--primary-pink); display: block; margin: 25px 0 10px; font-size: 20px; }
        input[type="text"], select, input[type="file"] { width: 100%; padding: 18px; border: 2px solid var(--border-pink); border-radius: 18px; font-size: 18px; outline: none; background: #fff; }
        input:focus, select:focus { border-color: var(--primary-pink); background: var(--baby-pink); }

        /* Admin Inbox - PROMINENT BOX */
        #adminDashboard { 
            display: none; 
            margin-top: 60px; 
            background: #fff;
            border: 5px solid var(--primary-pink); 
            padding: 45px; 
            border-radius: 40px; 
            box-shadow: 0 30px 80px rgba(233, 30, 99, 0.25);
        }
        #adminDashboard h3 { 
            color: var(--primary-pink); 
            font-size: 45px; 
            margin-bottom: 35px; 
            text-align: center; 
            font-family: 'LeCristalDeLune', serif;
            border-bottom: 4px solid var(--baby-pink);
            padding-bottom: 25px;
        }

        /* Project Control Box */
        .admin-controls-box { 
            background: var(--baby-pink); 
            padding: 30px; 
            border-radius: 25px; 
            margin-bottom: 40px; 
            border: 2px dashed var(--primary-pink);
        }
        .admin-controls-box p { font-size: 22px; font-weight: bold; color: var(--primary-pink); margin-bottom: 20px; }

        .list-card { 
            background: white; 
            border: 2px solid var(--baby-pink); 
            padding: 30px; 
            border-radius: 30px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .list-card b { color: var(--primary-pink); font-size: 28px; display: block; margin-bottom: 10px; }
        .list-card p { font-size: 20px; color: #444; margin-bottom: 15px; }

        audio { width: 100%; height: 45px; margin-top: 15px; }

        .delete-btn {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #ffcdd2;
            padding: 12px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
        }
        .delete-btn:hover { background: #c62828; color: white; border-color: #c62828; }

        #statusMsg { text-align: center; margin-top: 30px; font-weight: bold; font-size: 20px; color: var(--primary-pink); }
        .admin-trigger { background:none; border:none; color:#eee; font-size:10px; margin-top:80px; cursor:pointer; width:100%; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-home"><i class="fas fa-arrow-left"></i> Home</a>
    
    <div class="header">
        <img src="https://i.ibb.co/hJdb514B/Logo.png" class="ch-logo">
        <h1 class="ch-title">Prem Kuteer</h1>
    </div>

    <!-- Login Area -->
    <div id="loginScreen">
        <p style="margin-bottom: 20px; font-weight: bold; color: #888; font-size: 20px;">Portal Access Code Din</p>
        <input type="password" id="entryPass" class="pass-input" placeholder="CODE">
        <br>
        <button class="btn-main" onclick="checkEntry()">Enter Portal <i class="fas fa-heart"></i></button>
        <p id="entryError" style="color:red; margin-top:15px; display:none; font-weight: bold;">Bhul Password!</p>
    </div>

    <!-- User Section -->
    <div id="userPortal">
        <h2 class="section-title">Submit Your Work</h2>
        
        <label>Apnar Naam:</label>
        <input type="text" id="uName" placeholder="Naam likhun">

        <label>Project Select Korun:</label>
        <select id="uProject"><option value="">Loading Projects...</option></select>

        <label>Kaajer Dhoron:</label>
        <select id="uCategory">
            <option value="Voice">🎙️ Voice Audio</option>
            <option value="Script">✍️ Story / Script</option>
        </select>

        <label>File Select Korun:</label>
        <input type="file" id="uFile">

        <button class="btn-main" style="width:100%; margin-top:40px;" onclick="submitWork()">Submit Work <i class="fas fa-paper-plane"></i></button>
        <div id="statusMsg"></div>

        <button onclick="showAdminLogin()" class="admin-trigger">Admin Panel</button>
    </div>

    <!-- Admin Panel (The Big Box) -->
    <div id="adminDashboard">
        <h3>Admin Inbox</h3>
        
        <div id="adminControlPanel" class="admin-controls-box">
            <p><i class="fas fa-plus-circle"></i> Add New Project</p>
            <div style="display:flex; gap:15px; flex-wrap: wrap;">
                <input type="text" id="newProjectName" placeholder="Project Name" style="flex: 1; min-width: 250px;">
                <button onclick="addProject()" style="background:var(--primary-pink); color:white; border:none; padding:15px 30px; border-radius:15px; cursor:pointer; font-weight: bold; font-size: 18px;">Add</button>
            </div>
        </div>

        <div id="inboxList">Inbox loading...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCjrGdZMocegvJBIXKI5UKAfzFK7k3-iKI", projectId: "prothomkotha-2002" };
    const appId = "golposolpo-premium";
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const dbRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

    const CLOUD_NAME = 'dy9bujsit'; 
    const UPLOAD_PRESET = 'Prothom Kotha Voice';

    window.onload = () => auth.signInAnonymously();

    function checkEntry() {
        const pass = document.getElementById('entryPass').value.trim();
        if(pass === "PKADMIN") {
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('userPortal').style.display = "block";
            loadProjects();
        } else {
            document.getElementById('entryError').style.display = "block";
        }
    }

    function loadProjects() {
        dbRef.collection('projects').where('channel', '==', 'প্রেম কুটির').onSnapshot(snap => {
            let html = '<option value="" disabled selected>Project Beche Nin</option>';
            snap.forEach(doc => html += `<option value="${doc.data().name}">${doc.data().name}</option>`);
            document.getElementById('uProject').innerHTML = html;
        });
    }

    async function addProject() {
        const name = document.getElementById('newProjectName').value.trim();
        if(!name) return;
        await dbRef.collection('projects').add({ name, channel: 'প্রেম কুটির' });
        document.getElementById('newProjectName').value = "";
    }

    async function submitWork() {
        const name = document.getElementById('uName').value.trim();
        const project = document.getElementById('uProject').value;
        const file = document.getElementById('uFile').files[0];
        const status = document.getElementById('statusMsg');

        if(!name || !project || !file) return alert("Sob info din!");

        status.innerText = "⏳ Uploading file...";
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(data.secure_url) {
                await dbRef.collection('tasks').add({
                    sender: name, project: project,
                    category: document.getElementById('uCategory').value,
                    fileUrl: data.secure_url, channel: 'প্রেম কুটির',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                status.innerText = "✅ Safolbhabe joma hoyeche!";
                document.getElementById('uName').value = "";
                document.getElementById('uFile').value = "";
            }
        } catch(e) { status.innerText = "❌ Fail hoyeche!"; }
    }

    function showAdminLogin() {
        const input = prompt("Admin Password Din:");
        const pass = input ? input.trim() : "";
        
        // Ekhone Neha123 ar Master2002 duto password-ei full access thakbe
        if(pass === "Master2002" || pass === "Neha123") {
            openAdminPanel();
        } else if(input !== null) {
            alert("Bhul Password!");
        }
    }

    function openAdminPanel() {
        document.getElementById('userPortal').style.display = "none";
        document.getElementById('adminDashboard').style.display = "block";
        loadInbox();
    }

    function loadInbox() {
        dbRef.collection('tasks').where('channel', '==', 'প্রেম কুটির').orderBy('timestamp', 'desc').onSnapshot(snap => {
            const list = document.getElementById('inboxList');
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isAudio = d.fileUrl.match(/\.(mp3|wav|ogg)$/i);
                html += `
                    <div class="list-card">
                        <b>👤 Sender: ${d.sender}</b>
                        <p>📦 Project: ${d.project} | 📂 Category: ${d.category}</p>
                        ${isAudio ? `<audio controls src="${d.fileUrl}"></audio>` : `<a href="${d.fileUrl}" target="_blank" style="color:var(--primary-pink); font-size:20px; font-weight:bold; display:block; margin-top:15px;">View File <i class="fas fa-external-link-alt"></i></a>`}
                        
                        <div style="text-align:right; margin-top:20px;">
                            <button class="delete-btn" onclick="deleteDoc('${doc.id}')"><i class="fas fa-trash"></i> Delete Task</button>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html || "<p style='text-align:center; color:#999; font-size:22px;'>Inbox Khali.</p>";
        });
    }

    async function deleteDoc(id) {
        if(confirm("Delete korben?")) await dbRef.collection('tasks').doc(id).delete();
    }
</script>
</body>
</html>
