<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Go - প্রেম কুটির পোর্টাল</title>
    
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Custom Font: Le Cristal de Lune */
        @font-face {
            font-family: 'LeCristalDeLune';
            src: url('Le%20Cristal%20de%20Lune.ttf') format('truetype');
            font-display: swap;
        }

        :root {
            --primary-pink: #e91e63;
            --secondary-pink: #f06292;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            font-family: 'Kalpurush', Arial, sans-serif; 
            background: linear-gradient(135deg, #121212 0%, #000000 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        /* Ambient Glows */
        .glow { position: fixed; width: 400px; height: 400px; border-radius: 50%; z-index: -1; filter: blur(100px); opacity: 0.2; animation: pulse 10s infinite alternate; }
        .glow-1 { background: var(--primary-pink); top: -100px; left: -100px; }
        .glow-2 { background: #00d2ff; bottom: -100px; right: -100px; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .container { 
            width: 100%; max-width: 650px; 
            background: var(--glass-bg); backdrop-filter: blur(25px);
            padding: 40px 30px; border-radius: 35px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            border: 1px solid var(--glass-border);
            position: relative; align-self: flex-start;
        }

        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; text-align: center; }
        .ch-logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary-pink); box-shadow: 0 10px 20px rgba(233, 30, 99, 0.3); background: white; }
        .ch-title { font-size: 38px; color: var(--primary-pink); font-family: 'LeCristalDeLune', serif; letter-spacing: 2px; }
        .btn-home { position: absolute; top: 25px; left: 25px; text-decoration: none; color: #666; font-size: 14px; font-weight: bold; }

        /* Login Screen */
        #loginScreen { text-align: center; padding: 40px 0; }
        .pass-input { width: 100%; max-width: 320px; padding: 15px; border: 1px solid var(--glass-border); border-radius: 18px; font-size: 18px; text-align: center; margin-bottom: 20px; outline: none; background: rgba(255,255,255,0.05); color: white; }
        .btn-main { background: linear-gradient(45deg, var(--primary-pink), var(--secondary-pink)); color: white; border: none; padding: 15px 35px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(233, 30, 99, 0.2); }

        /* User Section */
        #userPortal { display: none; }
        label { font-weight: bold; color: var(--primary-pink); display: block; margin: 20px 0 8px; font-size: 15px; }
        input, select { width: 100%; padding: 15px; border: 1px solid var(--glass-border); border-radius: 15px; font-size: 16px; outline: none; background: rgba(255,255,255,0.03); color: white; }
        select option { background: #1a1a1a; }

        /* Admin Dashboard */
        #adminDashboard { display: none; margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 30px; }
        .list-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 18px; border-radius: 20px; margin-bottom: 15px; }
        .list-card b { color: var(--primary-pink); font-size: 17px; }
        audio { width: 100%; margin-top: 15px; height: 35px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; color: var(--primary-pink); }
    </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="container">
    <a href="index.html" class="btn-home"><i class="fas fa-chevron-left"></i> হোম</a>
    
    <div class="header">
        <img src="https://i.ibb.co/hJdb514B/Logo.png" class="ch-logo">
        <h1 class="ch-title">প্রেম কুটির</h1>
    </div>

    <!-- ১. লগইন স্ক্রিন (PKADMIN) -->
    <div id="loginScreen">
        <p style="margin-bottom: 20px; color:#888;">পোর্টাল কোড দিন</p>
        <input type="password" id="entryPass" class="pass-input" placeholder="পাসওয়ার্ড">
        <br>
        <button class="btn-main" onclick="checkEntry()">প্রবেশ করুন</button>
        <p id="entryError" style="color:red; margin-top:10px; display:none;">ভুল পাসওয়ার্ড!</p>
    </div>

    <!-- ২. ইউজার সেকশন (গল্প বা ভয়েস পাঠানোর অপশন) -->
    <div id="userPortal">
        <h3 style="text-align:center; color:#888; margin-bottom:20px;">আপনার কাজ জমা দিন</h3>
        
        <label>আপনার নাম:</label>
        <input type="text" id="uName" placeholder="নাম লিখুন">

        <label>প্রজেক্ট সিলেক্ট করুন:</label>
        <select id="uProject"><option value="">প্রজেক্ট লোড হচ্ছে...</option></select>

        <label>কাজের ধরন:</label>
        <select id="uCategory">
            <option value="Voice">🎙️ ভয়েস অডিও</option>
            <option value="Script">✍️ স্ক্রিপ্ট</option>
        </select>

        <label>ফাইল সিলেক্ট করুন:</label>
        <input type="file" id="uFile" accept="audio/*, .pdf, .doc, .txt">

        <button class="btn-main" style="width:100%; margin-top:30px;" onclick="submitWork()">জমা দিন <i class="fas fa-paper-plane"></i></button>
        <div id="statusMsg"></div>

        <!-- অ্যাডমিন প্যানেল ট্রিগার -->
        <button onclick="showAdminLogin()" style="background:none; border:none; color:#444; font-size:12px; margin-top:50px; cursor:pointer; width:100%;">অ্যাডমিন প্যানেল</button>
    </div>

    <!-- ৩. অ্যাডমিন ইনবক্স (শুধু অ্যাডমিন দেখবে) -->
    <div id="adminDashboard">
        <h3 style="color:var(--primary-pink); margin-bottom:20px; text-align:center; border-bottom:1px solid #333; padding-bottom:10px;">📥 ইনবক্স (সব কাজ)</h3>
        <div id="inboxList">লোড হচ্ছে...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCjrGdZMocegvJBIXKI5UKAfzFK7k3-iKI", projectId: "prothomkotha-2002" };
    const appId = "golposolpo-premium";
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const dbRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

    const CLOUD_NAME = 'dy9bujsit'; 
    const UPLOAD_PRESET = 'Prothom Kotha Voice';

    window.onload = () => auth.signInAnonymously();

    // Entry Logic
    function checkEntry() {
        const pass = document.getElementById('entryPass').value;
        if(pass === "PKADMIN") {
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('userPortal').style.display = "block";
            loadProjects();
        } else {
            document.getElementById('entryError').style.display = "block";
        }
    }

    // Load Projects
    function loadProjects() {
        dbRef.collection('projects').where('channel', '==', 'প্রেম কুটির').onSnapshot(snap => {
            let html = '<option value="" disabled selected>প্রজেক্ট বেছে নিন</option>';
            snap.forEach(doc => html += `<option value="${doc.data().name}">${doc.data().name}</option>`);
            document.getElementById('uProject').innerHTML = html;
        });
    }

    // Submit Work
    async function submitWork() {
        const name = document.getElementById('uName').value.trim();
        const project = document.getElementById('uProject').value;
        const file = document.getElementById('uFile').files[0];
        const status = document.getElementById('statusMsg');

        if(!name || !project || !file) return alert("সব তথ্য পূরণ করুন!");

        status.innerText = "⏳ ফাইল আপলোড হচ্ছে...";
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(data.secure_url) {
                await dbRef.collection('tasks').add({
                    sender: name,
                    project: project,
                    category: document.getElementById('uCategory').value,
                    fileUrl: data.secure_url,
                    channel: 'প্রেম কুটির',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                status.style.color = "green";
                status.innerText = "✅ সফলভাবে জমা হয়েছে!";
                document.getElementById('uName').value = "";
                document.getElementById('uFile').value = "";
            }
        } catch(e) { status.innerText = "❌ ব্যর্থ হয়েছে!"; }
    }

    // Admin Access
    function showAdminLogin() {
        const pass = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");
        if(pass === "Master2002") {
            document.getElementById('userPortal').style.display = "none";
            document.getElementById('adminDashboard').style.display = "block";
            loadInbox();
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    function loadInbox() {
        dbRef.collection('tasks').where('channel', '==', 'প্রেম কুটির').orderBy('timestamp', 'desc').onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isAudio = d.fileUrl.match(/\.(mp3|wav|ogg)$/i);
                html += `
                    <div class="list-card">
                        <b>👤 ${d.sender}</b>
                        <p style="font-size:12px; color:#888; margin:5px 0;">📦 প্রজেক্ট: ${d.project} | 📂 ক্যাটাগরি: ${d.category}</p>
                        ${isAudio ? `<audio controls src="${d.fileUrl}"></audio>` : `<a href="${d.fileUrl}" target="_blank" style="color:var(--primary-pink); font-size:13px;">ফাইলটি দেখুন <i class="fas fa-external-link-alt"></i></a>`}
                        <div style="text-align:right; margin-top:10px;">
                            <button onclick="deleteDoc('${doc.id}')" style="color:red; background:none; border:none; cursor:pointer; font-size:12px;">ডিলিট</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('inboxList').innerHTML = html || "কোনো ফাইল জমা পড়েনি।";
        });
    }

    async function deleteDoc(id) {
        if(confirm("ডিলিট করবেন?")) await dbRef.collection('tasks').doc(id).delete();
    }
</script>
</body>
</html>
