<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Go - পোর্টাল</title>
    
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* কাস্টম ফন্ট লোড করা হলো */
        @font-face {
            font-family: 'LeCristalDeLune';
            src: url('Le%20Cristal%20de%20Lune.ttf') format('truetype');
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            font-family: 'Kalpurush', Arial, sans-serif; 
            background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bg-circle { position: fixed; border-radius: 50%; z-1: -1; filter: blur(80px); opacity: 0.4; animation: float 15s infinite alternate; }
        .c1 { width: 300px; height: 300px; background: #00d2ff; top: -50px; left: -50px; }
        .c2 { width: 400px; height: 400px; background: #ff007f; bottom: -100px; right: -50px; }
        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }

        .main-container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px);
            padding: 40px 30px; 
            border-radius: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            width: 100%;
            max-width: 500px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .app-logo {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .app-logo img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }

        h1 { 
            font-size: 38px; 
            margin-bottom: 10px; 
            font-weight: normal; 
            font-family: 'LeCristalDeLune', serif; 
            color: #e91e63;
            letter-spacing: 2px;
        }
        p { color: #aaa; font-size: 15px; margin-bottom: 30px; }

        .portal-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-pk:hover { background: linear-gradient(45deg, #00d2ff, #3a7bd5); transform: translateY(-5px); border-color: transparent;}
        .btn-prem:hover { background: linear-gradient(45deg, #e91e63, #f06292); transform: translateY(-5px); border-color: transparent;}
        .btn-panch:hover { background: linear-gradient(45deg, #f57f17, #ffb300); transform: translateY(-5px); border-color: transparent;}

        .icon-box { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-img { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; }

    </style>
</head>
<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="main-container">
    <div class="app-logo">
        <img src="https://i.ibb.co/0p6wsj3J/image.png" alt="Story Go">
    </div>
    <h1>Story Go</h1>
    <p>আপনার চ্যানেল সিলেক্ট করুন</p>

    <!-- ১. প্রথম কথা (অডিশন) -->
    <a href="Prothom_kotha.html" class="portal-btn btn-pk">
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="icon-box" style="background: rgba(0, 210, 255, 0.2); color: #00d2ff;"><i class="fas fa-microphone"></i></div>
            <span>প্রথম কথা (অডিশন)</span>
        </div>
        <i class="fas fa-chevron-right"></i>
    </a>

    <!-- ২. প্রেম কুটির -->
    <a href="prem_kuteer.html" class="portal-btn btn-prem">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="https://i.ibb.co/hJdb514B/Logo.png" class="logo-img">
            <span>প্রেম কুটির</span>
        </div>
        <i class="fas fa-lock"></i>
    </a>

    <!-- ৩. পাঁচকাহন -->
    <a href="panchkahan.html" class="portal-btn btn-panch">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="https://i.ibb.co/r2KNWgBv/Logo.png" class="logo-img">
            <span>পাঁচকাহন</span>
        </div>
        <i class="fas fa-lock"></i>
    </a>
</div>

</body>
</html>
