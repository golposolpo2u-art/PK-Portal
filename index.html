<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Go - Home</title>
    
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Custom Font: Le Cristal de Lune */
        @font-face {
            font-family: 'LeCristalDeLune';
            src: url('Le%20Cristal%20de%20Lune.ttf') format('truetype');
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            font-family: 'Kalpurush', Arial, sans-serif; 
            background: linear-gradient(135deg, #0f0f0f 0%, #000000 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Ambient Glows */
        .glow { position: fixed; width: 450px; height: 450px; border-radius: 50%; z-index: -1; filter: blur(120px); opacity: 0.2; animation: move 20s infinite alternate; }
        .glow-1 { background: #e91e63; top: -150px; left: -150px; }
        .glow-2 { background: #00d2ff; bottom: -150px; right: -150px; }
        
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(60px, 60px); } }

        .main-card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(30px);
            padding: 45px 35px; 
            border-radius: 40px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.9); 
            width: 100%;
            max-width: 460px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .logo-wrapper {
            width: 115px;
            height: 115px;
            background: #ffffff;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(233, 30, 99, 0.4);
            border: 4px solid #e91e63;
        }

        .logo-wrapper img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        h1 { 
            font-size: 48px; 
            margin-bottom: 5px; 
            font-family: 'LeCristalDeLune', serif; 
            color: #e91e63;
            letter-spacing: 2px;
            text-shadow: 0 0 25px rgba(233, 30, 99, 0.5);
        }

        .tagline { color: #8a8a8a; font-size: 14px; margin-bottom: 45px; letter-spacing: 1px; }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-link:hover {
            transform: scale(1.03) translateY(-8px);
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.3);
        }

        /* Theme Accents */
        .pk-accent:hover { background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 12px 35px rgba(0, 210, 255, 0.3); }
        .prem-accent:hover { background: linear-gradient(45deg, #e91e63, #f06292); box-shadow: 0 12px 35px rgba(233, 30, 99, 0.3); }

        .btn-inner { display: flex; align-items: center; gap: 18px; }

        .icon-circle { 
            width: 50px; 
            height: 50px; 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            background: rgba(255,255,255,0.08);
        }

        .ch-logo-small { 
            width: 50px; 
            height: 50px; 
            border-radius: 18px; 
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .chevron-right { font-size: 14px; opacity: 0.6; }

    </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="main-card">
    <div class="logo-wrapper">
        <img src="https://i.ibb.co/0p6wsj3J/image.png" alt="Story Go Logo">
    </div>
    
    <h1>Story Go</h1>
    <p class="tagline">আপনার পছন্দের চ্যানেলটি সিলেক্ট করুন</p>

    <!-- ১. প্রথম কথা অডিশন - prothom_kotha.html -->
    <a href="prothom_kotha.html" class="btn-link pk-accent">
        <div class="btn-inner">
            <div class="icon-circle" style="color: #00d2ff;">
                <i class="fas fa-microphone-alt"></i>
            </div>
            <span>প্রথম কথা (অডিশন)</span>
        </div>
        <i class="fas fa-chevron-right chevron-right"></i>
    </a>

    <!-- ২. প্রেম কুটির - prem_kuteer.html -->
    <a href="prem_kuteer.html" class="btn-link prem-accent">
        <div class="btn-inner">
            <img src="https://i.ibb.co/hJdb514B/Logo.png" class="ch-logo-small" alt="Prem Kuteer">
            <span>প্রেম কুটির</span>
        </div>
        <i class="fas fa-chevron-right chevron-right"></i>
    </a>

    <!-- ৩. পাঁচকাহন - এখন এটি আনলক করা হয়েছে -->
    <a href="panchkahan.html" class="btn-card panch-hover">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="https://i.ibb.co/r2KNWgBv/Logo.png" class="ch-logo-s">
            <span>পাঁচকাহন</span>
        </div>
        <i class="fas fa-chevron-right" style="font-size:14px; opacity:0.5;"></i>
    </a>
</div>

</body>
</html>
