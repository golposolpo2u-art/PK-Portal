<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Go - হোমপেজ</title>
    
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* কালপুরুষ ফন্ট সব জায়গায় সেট করা হলো */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            transition: all 0.3s ease; 
            font-family: 'Kalpurush', Arial, sans-serif; 
        }

        body { 
            background: linear-gradient(135deg, #0d0d0d 0%, #000000 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ব্যাকগ্রাউন্ড গ্লো ইফেক্ট */
        .glow { 
            position: fixed; 
            width: 400px; 
            height: 400px; 
            border-radius: 50%; 
            z-index: -1; 
            filter: blur(100px); 
            opacity: 0.15; 
            animation: move 15s infinite alternate;
        }
        .glow-1 { background: #e91e63; top: -100px; left: -100px; }
        .glow-2 { background: #d4af37; bottom: -100px; right: -100px; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }

        .main-container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px);
            padding: 40px 20px; /* Mobile Default Padding */
            border-radius: 30px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            width: 100%;
            max-width: 550px; /* PC Width */
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
        }

        .logo-area {
            width: 100px; /* Mobile Size */
            height: 100px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #e91e63;
            box-shadow: 0 0 25px rgba(233, 30, 99, 0.3);
        }
        .logo-area img { width: 70%; height: 70%; object-fit: contain; }

        h1 { 
            font-size: clamp(32px, 8vw, 46px); /* Responsive Font Size */
            margin-bottom: 5px; 
            color: #e91e63; 
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(233, 30, 99, 0.4);
        }
        .tagline { 
            color: #aaa; 
            font-size: clamp(14px, 4vw, 16px); 
            margin-bottom: 35px; 
            font-weight: bold; 
        }

        /* বাটন কার্ড ডিজাইন */
        .portal-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px; /* Mobile Padding */
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-size: clamp(16px, 5vw, 20px); /* Responsive Font */
            font-weight: bold;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }
        .portal-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }

        /* প্রথম কথা বাটন থিম (বেগুনি-গোলাপি) */
        .btn-pk:hover { 
            background: linear-gradient(45deg, #8a2be2, #d130eb); 
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.4);
            border-color: transparent;
        }

        /* Hover Effect for the icon to make it visible */
        .btn-pk:hover .icon-box {
            color: #b339e6 !important;
            background: #ffffff !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* প্রেম কুটির বাটন থিম */
        .btn-prem:hover { 
            background: linear-gradient(45deg, #e91e63, #f06292); 
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.3);
            border-color: transparent;
        }

        /* পাঁচকাহন বাটন থিম */
        .btn-panch:hover { 
            background: linear-gradient(45deg, #d4af37, #b8860b); 
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            border-color: transparent;
        }

        .icon-box { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px;
            margin-right: 12px;
        }
        .logo-thumb { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            object-fit: cover; 
            border: 2px solid rgba(255,255,255,0.1); 
            margin-right: 12px;
        }

        footer { 
            margin-top: 30px; 
            font-size: 12px; 
            color: #777; 
            font-weight: bold; 
            text-align: center;
        }

        /* --- DESKTOP & LAPTOP OPTIMIZATIONS (PC View) --- */
        @media (min-width: 768px) {
            .main-container {
                padding: 50px 40px;
                border-radius: 40px;
            }
            .logo-area {
                width: 120px;
                height: 120px;
                margin-bottom: 25px;
            }
            .portal-card {
                padding: 20px 25px;
                border-radius: 22px;
                margin-bottom: 20px;
            }
            .icon-box, .logo-thumb {
                width: 50px;
                height: 50px;
                border-radius: 15px;
                margin-right: 15px;
                font-size: 24px;
            }
            footer {
                font-size: 13px;
                margin-top: 40px;
            }
        }
    </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="main-container">
    <div class="logo-area">
        <img src="https://i.ibb.co/0p6wsj3J/image.png" alt="Story Go">
    </div>
    <h1>Story Go</h1>
    <p class="tagline">আপনার পছন্দের পোর্টালটি বেছে নিন</p>

    <!-- ১. প্রথম কথা (অডিশন) -->
    <a href="Prothom_kotha.html" class="portal-card btn-pk">
        <div style="display:flex; align-items:center;">
            <div class="icon-box" style="background: rgba(0, 210, 255, 0.15); color: #00d2ff;"><i class="fas fa-microphone-alt"></i></div>
            <span>প্রথম কথা (স্মার্ট অডিও)</span>
        </div>
        <i class="fas fa-chevron-right" style="opacity: 0.5; font-size: 16px;"></i>
    </a>

    <!-- ২. প্রেম কুটির -->
    <a href="prem_kuteer.html" class="portal-card btn-prem">
        <div style="display:flex; align-items:center;">
            <img src="https://i.ibb.co/hJdb514B/Logo.png" class="logo-thumb">
            <span>প্রেম কুটির</span>
        </div>
        <i class="fas fa-chevron-right" style="opacity: 0.5; font-size: 16px;"></i>
    </a>

    <!-- ৩. পাঁচকাহন -->
    <a href="panchkahan.html" class="portal-card btn-panch">
        <div style="display:flex; align-items:center;">
            <img src="https://i.ibb.co/r2KNWgBv/Logo.png" class="logo-thumb">
            <span>পাঁচকাহন</span>
        </div>
        <i class="fas fa-chevron-right" style="opacity: 0.5; font-size: 16px;"></i>
    </a>

    <footer>&copy; 2026 Story Go - All Rights Reserved</footer>
</div>

</body>
</html>
